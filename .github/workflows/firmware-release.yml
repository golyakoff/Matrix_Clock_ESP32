name: Firmware Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        pio --version

    - name: Build all environments
      run: |
        pio run -e esp32_4mb_debug  
        pio run -e esp32_4mb        
        pio run -e esp32_16mb

    - name: Get version from tag
      id: get_version
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Rename firmware files with meaningful names
      run: |
        cp .pio/build/esp32_4mb_debug/firmware.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_fw.bin"
        cp .pio/build/esp32_4mb_debug/partitions.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_pt.bin"
        
        cp .pio/build/esp32_4mb/firmware.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_fw.bin"
        cp .pio/build/esp32_4mb/partitions.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_pt.bin"
        
        cp .pio/build/esp32_16mb/firmware.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin"
        cp .pio/build/esp32_16mb/partitions.bin "tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin"

    - name: List final artifacts
      run: |
        echo "=== Final firmware files ==="
        ls -la *.bin
        echo ""
        echo "=== File sizes ==="
        du -h *.bin

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_fw.bin
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_pt.bin
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_fw.bin
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_pt.bin
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin
          tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin

        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        name: Release ${{ steps.get_version.outputs.TAG_NAME }}
        body: |
          # Tetris Clock ESP32 Firmware
          
          **Version:** ${{ steps.get_version.outputs.TAG_NAME }}
          **Build date:** ${{ github.event.head_commit.timestamp }}
          
          ## Available Firmware Images
          
          ### 🐞 Debug Version (with logging)
          **4MB Flash:**
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_fw.bin` - Firmware
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_pt.bin` - Partition table

          ```bash
          esptool.py --chip esp32 --baud 921600 write_flash --flash-mode dio --flash-size 4MB \
          0x1000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_fw.bin \
          0x8000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_debug_4mb_pt.bin
          ```
          
          ### 🚀 Production Version (optimized)
          **4MB Flash:**
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_fw.bin` - Firmware
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_pt.bin` - Partition table

          ```bash
          esptool.py --chip esp32 --baud 921600 write_flash --flash-mode dio --flash-size 4MB \
          0x1000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_fw.bin \
          0x8000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_4mb_pt.bin
          ```
          
          **16MB Flash:**
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin` - Firmware
          - `tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin` - Partition table
          
          ```bash
          esptool.py --chip esp32 --baud 921600 write_flash --flash-mode dio --flash-size 16MB \
          0x1000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_fw.bin \
          0x8000 tetris-clock_${{ steps.get_version.outputs.TAG_NAME }}_release_16mb_pt.bin
          ```
          
          ## Notes
          - **Debug versions** include serial logging and debug features
          - **Production versions** are optimized for size and performance
          - Use corresponding partition table with each firmware
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}