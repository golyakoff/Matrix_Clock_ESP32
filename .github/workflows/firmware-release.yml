name: Firmware Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        pio --version

    - name: Build all environments
      run: |
        pio run -e esp32_4mb_debug  
        pio run -e esp32_4mb        
        pio run -e esp32_16mb

    - name: Get version from tag
      id: get_version
      run: |
        # Извлекаем версию из тега (убираем 'refs/tags/v')
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${VERSION#v}  # Убираем 'v' если есть
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Rename firmware files with meaningful names
      run: |
        # Извлекаем версию без 'v'
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${VERSION#v}
        
        # Создаем понятные имена файлов
        cp .pio/build/esp32_4mb_debug/firmware.bin "fw_tetris_clock_${VERSION}_debug_4mb.bin"
        cp .pio/build/esp32_4mb_debug/partitions.bin "partitions_${VERSION}_debug_4mb.bin"
        
        cp .pio/build/esp32_4mb/firmware.bin "fw_tetris_clock_${VERSION}_release_4mb.bin"
        cp .pio/build/esp32_4mb/partitions.bin "partitions_${VERSION}_release_4mb.bin"
        
        cp .pio/build/esp32_16mb/firmware.bin "fw_tetris_clock_${VERSION}_release_16mb.bin"
        cp .pio/build/esp32_16mb/partitions.bin "partitions_${VERSION}_release_16mb.bin"

    - name: List final artifacts
      run: |
        echo "=== Final firmware files ==="
        ls -la *.bin
        echo ""
        echo "=== File sizes ==="
        du -h *.bin

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin
          partitions_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin
          fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin
          partitions_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin
          fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin
          partitions_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin
        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        name: Release ${{ steps.get_version.outputs.TAG_NAME }}
        body: |
          # Tetris Clock ESP32 Firmware
          
          **Version:** ${{ steps.get_version.outputs.TAG_NAME }}
          **Build date:** ${{ github.event.head_commit.timestamp }}
          
          ## Available Firmware Images
          
          ### 🐞 Debug Version (with logging)
          **4MB Flash:**
          - `fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin` - Firmware
          - `partitions_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin` - Partition table
          
          ### 🚀 Production Version (optimized)
          **4MB Flash:**
          - `fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin` - Firmware
          - `partitions_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin` - Partition table
          
          **16MB Flash:**
          - `fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin` - Firmware
          - `partitions_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin` - Partition table
          
          ## Flash Instructions

          **For 4MB Debug:**
          ```bash
          esptool.py --chip esp32 --baud 460800 write_flash \
          0x1000 fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin \
          0x8000 partitions_${{ steps.get_version.outputs.VERSION }}_debug_4mb.bin
          ```

          **For 4MB Release:**
          ```bash
          esptool.py --chip esp32 --baud 460800 write_flash \
          0x1000 fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin \
          0x8000 partitions_${{ steps.get_version.outputs.VERSION }}_release_4mb.bin
          ```
          
          **For 16MB Release:**
          ```bash
          esptool.py --chip esp32 --baud 460800 write_flash \
          0x1000 fw_tetris_clock_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin \
          0x8000 partitions_${{ steps.get_version.outputs.VERSION }}_release_16mb.bin
          ```
          
          ## Notes
          - **Debug versions** include serial logging and debug features
          - **Release versions** are optimized for size and performance
          - Use corresponding partition table with each firmware
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}